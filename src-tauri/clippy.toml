# Clippy configuration — machine-enforces parts of style/rust.md.
# CI runs `cargo clippy --all-targets --all-features -- -D warnings`, so every
# warning enabled here is effectively a hard gate. Lint levels live in
# Cargo.toml `[lints.clippy]` so they apply to every target, not just the lib.

# Do not add `disallowed-macros = ["std::eprintln"]`: the lint cannot exempt
# test code or the eprintln! that `tauri::generate_context!` expands to.
# "No eprintln! in production" stays review-enforced (style/rust.md §2).

# Complexity smell guards (default-on clippy lints), with a little headroom
# over the rustc defaults for the Message/handler constructors.
too-many-arguments-threshold = 8
type-complexity-threshold = 250

# unwrap()/expect() are forbidden in production but free in tests. These keys
# scope `clippy::unwrap_used` / `clippy::expect_used` (warned via Cargo.toml
# `[lints.clippy]`) so #[cfg(test)] code is exempt.
allow-unwrap-in-tests = true
allow-expect-in-tests = true

# Threshold for `clippy::cognitive_complexity` (warned via Cargo.toml
# `[lints.clippy]`).
cognitive-complexity-threshold = 30
